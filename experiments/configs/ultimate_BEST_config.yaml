# CONFIGURACIÓN ULTIMATE - BASADA EN EL MEJOR CHECKPOINT (Score: 10.725)
# Extraída del Trial 2, Checkpoint 1 del autotuning ultimate
# Score superior: 10.725 vs 9.566 del trial que completó

control:
  all_red: 1
  control_interval: 8           # Optimizado para mejor respuesta
  max_green: 60
  min_green: 12                 # Más flexible que el 18 del trial completado
  yellow: 3

detectors:
  e2_capacity_per_lane: 6
  e2_ids:
  - E_in_0
  - E_in_1
  - S_in_0
  - S_in_1
  jam_length_thr_m: 20.0
  v_free: 13.9

reward:
  # Pesos optimizados del mejor checkpoint
  w_served: 0.5                 # Más enfoque en throughput
  w_queue: 0.6                  # Balance con colas
  w_backlog: 0.8                # Fuerte penalización backlog
  w_switch: 0.12                # Menos penalización switches
  w_spill: 0.2                  # Penalización spillback moderada
  kappa_backlog: 10             # Factor backlog optimizado
  sat_headway_s: 1.8            # Headway más realista

# PPO Hiperparámetros base
ppo:
  batch_size: 64
  clip_range: 0.2
  ent_coef: 0.01
  gamma: 0.99
  lr: 0.0003
  n_steps: 2048
  policy: MlpPolicy

# PPO Hiperparámetros optimizados (del mejor checkpoint)
ppo_optimized:
  learning_rate: 0.0008         # Learning rate más agresivo
  gamma: 0.98                   # Discount factor más bajo para mejor adaptabilidad
  clip_range: 0.3               # Clip range intermedio
  ent_coef: 0.02                # Entropía para exploración

# Configuración SUMO
sumo:
  cfg_path: data/sumo/cfg/four_way_1h.sumo.cfg
  gui: false
  step_length: 1.0

# Seeds para reproducibilidad
seeds:
  env: 42
  numpy: 42
  torch: 42

# Configuración de entrenamiento
train:
  eval_freq: 10000
  max_episode_steps: 360
  n_envs: 1
  total_timesteps: 50000        # Entrenamiento más extenso

# Metadata de optimización
optimization_metadata:
  source: "manual_best_checkpoint_analysis"
  best_checkpoint_score: 10.725
  original_completed_score: 9.565
  improvement_factor: 1.12
  note: "Configuración basada en Trial 2, Checkpoint 1 - mejor performance observada"
  timestamp: "2025-09-06 manual_optimization"
  recommended_for: "production_training"


