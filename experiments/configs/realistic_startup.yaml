sumo:
  cfg_path: data/sumo/cfg/four_way_1h.sumo.cfg
  step_length: 1.0
  gui: false
control:
  control_interval: 8
  min_green: 25     # 25 segundos para compensar tiempo de arranque + seguridad peatonal
  yellow: 3
  all_red: 2        # Tiempo de despeje
  max_green: 60
detectors:
  e2_ids:
  - E_in_0
  - E_in_1
  - S_in_0
  - S_in_1
  v_free: 13.9
  jam_length_thr_m: 20.0
  e2_capacity_per_lane: 6
reward:
  w_served: 0.30    # Más peso al throughput efectivo
  w_queue: 0.35     # Reducir colas
  w_backlog: 0.25   # Controlar acumulación
  w_switch: 0.20    # Penalizar cambios frecuentes (tiempo de arranque)
  w_spill: 0.15
  kappa_backlog: 12
  sat_headway_s: 3.0    # Tiempo realista: 2s base + 1s tiempo de arranque
ppo:
  policy: MlpPolicy
  lr: 0.0003
  gamma: 0.99
  n_steps: 2048
  batch_size: 64
  clip_range: 0.2
  ent_coef: 0.01
train:
  max_episode_steps: 360
  total_timesteps: 100000
  eval_freq: 10000
  n_envs: 1
seeds:
  numpy: 42
  torch: 42
  env: 42

# CONFIGURACIÓN REALISTA CON TIEMPO DE ARRANQUE
# ==============================================
# 
# TIEMPOS DE ARRANQUE CONSIDERADOS:
# • Tiempo de reacción conductor: 1-2 segundos
# • Aceleración gradual: 0.5-1 segundo  
# • Efecto cascada entre vehículos: 0.5 segundos adicionales
# • Total tiempo perdido: ~2-3.5 segundos
#
# PARÁMETROS AJUSTADOS:
# • min_green: 25s (20s peatones + 5s compensación arranque)
# • sat_headway_s: 3.0s (incluye tiempo de arranque)
# • w_switch: 0.20 (penalizar cambios por costo de arranque)
# • w_served: 0.30 (priorizar throughput efectivo)
#
# BENEFICIOS ESPERADOS:
# • Modelado más realista del comportamiento vehicular
# • Mejor aprovechamiento del tiempo verde efectivo
# • Reducción de cambios innecesarios que causan pérdidas
# • Mayor eficiencia general del sistema

