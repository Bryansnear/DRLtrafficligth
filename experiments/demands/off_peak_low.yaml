# Perfil de demanda: Horas valle (10 PM - 6 AM)
# Tráfico nocturno muy bajo y equilibrado
seed: 42
type: dynamic  
base_vph:
  E2W: 120  # Muy bajo flujo nocturno
  E2N: 80   # Muy bajo flujo nocturno
  S2N: 120  # Muy bajo flujo nocturno  
  S2W: 80   # Muy bajo flujo nocturno

windows:
  # Noche temprana (10-12 PM) - algo más de tráfico
  - begin: 0
    end: 7200     # 2 hours
    delta_vph:
      E2W: 80     # 120+80=200 vph
      E2N: 40     # 80+40=120 vph
      S2N: 80     # 120+80=200 vph
      S2W: 40     # 80+40=120 vph
      
  # Madrugada profunda (12-4 AM) - mínimo
  - begin: 7200
    end: 21600    # 4 hours  
    delta_vph:
      E2W: -20    # 120-20=100 vph MÍNIMO
      E2N: -20    # 80-20=60 vph MÍNIMO
      S2N: -20    # 120-20=100 vph MÍNIMO
      S2W: -20    # 80-20=60 vph MÍNIMO
      
  # Pre-amanecer (4-6 AM) - ligero incremento
  - begin: 21600
    end: 28800    # 2 hours
    delta_vph:
      E2W: 30     # 120+30=150 vph
      E2N: 20     # 80+20=100 vph  
      S2N: 30     # 120+30=150 vph
      S2W: 20     # 80+20=100 vph



